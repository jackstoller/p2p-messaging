# Three-node development cluster.
# Nodes use Docker's internal DNS so no stable IPs are needed.
# node1 is the bootstrap seed for node2 and node3.
#
# Run:
#   docker compose up --build
#
# Optional host debugging access for node1 is published on port 19001 by default.
# Override with NODE1_DEBUG_PORT if needed.
# Each node also exposes an HTTP API on 8081 inside the mesh and mapped host
# ports 18081-18083 by default.
#
# Bring a node down to test crash recovery:
#   docker compose stop node2

services:
  node1:
    build: .
    command: >
      -id=node1
        -listen=:9000
        -advertise=node1:9000
        -db=/data/node1.db
        -replicas=2
        -ca-cert=/certs/ca.crt
        -node-cert=/certs/node1.crt
        -node-key=/certs/node1.key
    volumes:
      - node1-data:/data
      - ./certs:/certs:ro
    networks:
      - mesh
    ports:
      - "${NODE1_DEBUG_PORT:-19001}:9000"   # expose for debugging; not required internally
      - "${NODE1_HTTP_PORT:-18081}:8081"

  node2:
    build: .
    command: >
      -id=node2
        -listen=:9000
        -advertise=node2:9000
        -peers=node1:9000
        -db=/data/node2.db
        -replicas=2
        -ca-cert=/certs/ca.crt
        -node-cert=/certs/node2.crt
        -node-key=/certs/node2.key
    volumes:
      - node2-data:/data
      - ./certs:/certs:ro
    networks:
      - mesh
    ports:
      - "${NODE2_HTTP_PORT:-18082}:8081"
    depends_on:
      - node1

  node3:
    build: .
    command: >
      -id=node3
        -listen=:9000
        -advertise=node3:9000
        -peers=node1:9000
        -db=/data/node3.db
        -replicas=2
        -ca-cert=/certs/ca.crt
        -node-cert=/certs/node3.crt
        -node-key=/certs/node3.key
    volumes:
      - node3-data:/data
      - ./certs:/certs:ro
    networks:
      - mesh
    ports:
      - "${NODE3_HTTP_PORT:-18083}:8081"
    depends_on:
      - node1

  monitor:
    build: .
    entrypoint: ["/app/monitor"]
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-p2p-messaging}
    command:
      - "-listen=:8080"
      - "-project-dir=/workspace"
      - "-compose-file=/workspace/docker-compose.yml"
      - "-tail=20000"
    volumes:
      - ./:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mesh
    ports:
      - "${MONITOR_PORT:-8080}:8080"
    depends_on:
      - node1
      - node2
      - node3

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  mesh:
    driver: bridge
