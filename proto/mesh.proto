syntax = "proto3";

package mesh;

option go_package = "github.com/jackstoller/p2p-messaging/proto/mesh;mesh";

// VnodeState tracks whether a virtual node is accepting traffic.
// Vnodes start INACTIVE and become ACTIVE once a transfer completes.
enum VnodeState {
  VNODE_INACTIVE = 0;
  VNODE_ACTIVE   = 1;
}

// PeerState is the broadcast state of a physical node.
// SUSPECT is intentionally absent because it is local only and transient.
enum PeerState {
  PEER_UP   = 0;
  PEER_DOWN = 1;
}

// Shared types

// VirtualNode is one position on the consistent hash ring.
message VirtualNode {
  string     id       = 1; // "nodeId:index", e.g. "node1:0"
  string     node_id  = 2;
  uint64     position = 3; // ring position from hash(nodeId:index)
  string     address  = 4; // gRPC address of the physical node TODO: Remove, redundant
  VnodeState state    = 5;
}

// Member describes a known physical node in the mesh.
message Member {
  string               node_id = 1;
  string               address = 2; // gRPC address of the physical node
  repeated VirtualNode vnodes  = 3;
  PeerState            state   = 4;
}

// DataRecord is a stored key/value pair with a timestamp for last-write-wins
// conflict resolution. The timestamp is set by the primary on write.
message DataRecord {
  string key       = 1;
  bytes  value     = 2;
  int64  timestamp = 3; // unix millis
}

// MembershipService

service MembershipService {
  // New node to bootstrap. "I exist, add me to the mesh." TODO Is this step necessary?
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);

  // New node to bootstrap. "Give me the full member list."
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);

  // Any node to all nodes. Broadcast that a node came up or went down.
  rpc NodeStatus(NodeStatusRequest) returns (NodeStatusResponse);

  // Any node to any node for a liveness probe.
  rpc Ping(PingRequest) returns (PingResponse);

  // Any node to a peer. "Do you also think this node is unreachable?"
  rpc ConfirmSuspect(ConfirmSuspectRequest) returns (ConfirmSuspectResponse);
}

message RegisterNodeRequest  { Member member = 1; }
message RegisterNodeResponse { bool   accepted = 1; }

message ListNodesRequest     { string requesting_node_id = 1; }
message ListNodesResponse    { repeated Member members   = 1; }

// NodeStatusRequest carries a PEER_UP announcement (with vnodes) or a
// PEER_DOWN declaration (vnodes omitted).
message NodeStatusRequest {
  string               node_id = 1;
  PeerState            state   = 2;
  repeated VirtualNode vnodes  = 3; // TODO: make optional?
}
message NodeStatusResponse {}

message PingRequest  { string node_id = 1; } // TODO: add timestamps for latency
message PingResponse { string node_id = 1; }

message ConfirmSuspectRequest  { string suspect_node_id = 1; }
message ConfirmSuspectResponse { bool   confirmed       = 1; }

// TransferService
// Handles range handoff when a joining vnode activates. (Phase 2)

service TransferService {
  // Joiner to current owner. "I claim my target range, begin handoff."
  rpc RequestRangeTransfer(RequestRangeTransferRequest) returns (RequestRangeTransferResponse);

  // Owner to joiner. Stream records in the accepted transfer range.
  rpc StreamRange(StreamRangeRequest) returns (stream RangeDataChunk);

  // Owner to joiner. Forward a live write that arrived during transfer.
  rpc ForwardWrite(ForwardWriteRequest) returns (ForwardWriteResponse);

  // Joiner to owner. "I have all range data, finalize handoff."
  rpc CompleteRangeTransfer(CompleteRangeTransferRequest) returns (CompleteRangeTransferResponse);

  // New owner to all nodes. Target vnode is now ACTIVE and serves its range.
  rpc RangeStatusUpdate(RangeStatusUpdateRequest) returns (RangeStatusUpdateResponse);
}

message RequestRangeTransferRequest {
  string target_vnode_id  = 1;
  string requestor = 2;
}
message RequestRangeTransferResponse { bool accepted = 1; }

message StreamRangeRequest { string target_vnode_id = 1; }
message RangeDataChunk {
  string              target_vnode_id = 1;
  int32               seq      = 2;
  bool                final    = 3;
  repeated DataRecord records  = 4;
}

message ForwardWriteRequest {
  string     write_id = 1;
  DataRecord record   = 2;
}
message ForwardWriteResponse { string write_id = 1; }

message CompleteRangeTransferRequest  { string target_vnode_id = 1; }
message CompleteRangeTransferResponse { bool   accepted = 1; }

message RangeStatusUpdateRequest {
  string     target_vnode_id = 1;
  string     owner_id = 2;
  VnodeState state    = 3;
}
message RangeStatusUpdateResponse {}

// ReplicaService
// Handles replication and replica repair after topology changes. (Phase 3)

service ReplicaService {
  // Primary to replica. Update rank and primary identity.
  rpc UpdateReplicaRank(UpdateReplicaRankRequest) returns (UpdateReplicaRankResponse);

  // Primary to new replica. Store this record.
  rpc CreateReplica(CreateReplicaRequest) returns (CreateReplicaResponse);
}

message UpdateReplicaRankRequest {
  string vnode_id   = 1;
  string primary_id = 2;
  int32  new_rank   = 3;
}
message UpdateReplicaRankResponse {}

message CreateReplicaRequest {
  string     vnode_id = 1;
  DataRecord record   = 2;
}
message CreateReplicaResponse { bool ack = 1; }

// DataService
// External-facing read/write interface routed to the primary. (Phase 3)

service DataService {
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Read(ReadRequest)   returns (ReadResponse);
}

message WriteRequest {
  string key   = 1;
  bytes  value = 2;
}
message WriteResponse {
  bool  ok        = 1;
  int64 timestamp = 2;
}

message ReadRequest  { string key = 1; }
message ReadResponse {
  bytes value = 1;
  bool  found = 2;
}
